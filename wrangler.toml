# Worker name. Forks should change this to a unique name (it becomes
# part of the workers.dev URL). The CI/CD pipeline reads this to know
# which worker to deploy to.
name = "bolao-copa-do-mundo"

compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Use the wrapper at the repo root, which re-exports OpenNext's fetch
# handler AND adds a scheduled() handler that pings the cron endpoints.
# Pointing main directly at .open-next/worker.js drops the scheduled
# handler — crons would fire but no-op silently, leaving jobs/results
# never synced.
main = "worker-entry.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "bolao-prod"
database_id = "0e167078-436a-44fc-b79c-30f5d9a81031"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "NEXT_INC_CACHE_KV"
id = "a585a77ba1cf4c4e82ccf4d3521995e0"

[[r2_buckets]]
binding = "FILES"
bucket_name = "bolao-files"

# Service binding to allow the scheduled() handler to call own routes
# via env.SELF.fetch() instead of fetching the public URL.
# Without this, self-fetches via APP_URL fail with Cloudflare error 1042
# ("subrequest depth limit"), making all cron jobs no-op.
[[services]]
binding = "SELF"
service = "bolao-copa-do-mundo"

[vars]
DEFAULT_LOCALE = "pt-BR"
TIMEZONE = "America/Sao_Paulo"
# APP_URL must be set here (not just in the dashboard) so that wrangler deploy
# preserves it. If set only in the dashboard, deploys via CI/CD will wipe it.
# Forks should update this to match their worker's URL.
APP_URL = "https://bolao-copa-do-mundo.ti-8a6.workers.dev"

# Enable observability so logs from the scheduled() handler and routes
# show up in the dashboard. Otherwise debugging cron issues is painful.
[observability]
enabled = true

# Secrets — set via `wrangler secret put` or the dashboard:
#   Required:
#     SESSION_SECRET           # 32+ bytes random, signs the session cookie
#     FOOTBALL_DATA_API_KEY    # api.football-data.org token
#     CRON_SECRET              # bearer for /api/cron/* endpoints
#   Optional (only needed if you want email notifications):
#     RESEND_API_KEY           # if absent, emails are logged to the worker console
#     RESEND_FROM_EMAIL        # ex: bolao@suaempresa.com.br
#
# First-time setup: deploy, then access /cadastro on the public URL.
# The first account created becomes the superadmin and its email domain is
# auto-added to the allowed_domains table — colleagues can sign up next.
# No bootstrap env vars needed.

[triggers]
crons = [
  "*/5 * * * *",   # sync-results during match days
  "0 * * * *",     # reminders (hourly)
  "0 23 * * *",    # daily recap at 23h UTC
]
